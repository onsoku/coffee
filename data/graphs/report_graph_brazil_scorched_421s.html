<!DOCTYPE html>
  <html lang="ja">
    <head>
      <meta charset="UTF-8">
        <title>Roast Report - brazil</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
          body { font-family: sans-serif; background: #222; color: #eee; margin: 20px; }
          .container { max-width: 1000px; margin: 0 auto; background: #333; padding: 20px; border-radius: 8px; }
          h1 { margin-top: 0; color: #fff; }
          .info { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; background: #444; padding: 15px; border-radius: 4px; }
          .info-box { flex: 1; min-width: 200px; }
          .info-box p { margin: 5px 0; }
          .score-bar { background: #555; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
          .score-fill { background: #4caf50; height: 100%; transition: width 1s ease-in-out; }
          canvas { background: #222; border-radius: 4px; padding: 10px; }
        </style>
    </head>
    <body>
      <div class="container">
        <h1>Roasting Analysis: brazil (Very Dark / Scorched)</h1>
        <div class="info">
          <div class="info-box">
            <h3>General</h3>
            <p>Total Time: 7m 1s</p>
            <p>End Temp: 350.5 °C</p>
            <p>Dry End: 1:55</p>
            <p>1st Crack: 2:39</p>
            <p>2nd Crack: 3:03</p>
          </div>
          <div class="info-box">
            <h3>Cupping Score (64)</h3>
            
          <div style="font-size: 0.9em; margin-bottom: 4px;">Aroma: 50
            <div class="score-bar"><div class="score-fill" style="width: 50%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">Flavor: 50
            <div class="score-bar"><div class="score-fill" style="width: 50%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">Aftertaste: 80
            <div class="score-bar"><div class="score-fill" style="width: 80%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">Acidity: 40
            <div class="score-bar"><div class="score-fill" style="width: 40%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">Body: 75
            <div class="score-bar"><div class="score-fill" style="width: 75%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">Sweetness: 50
            <div class="score-bar"><div class="score-fill" style="width: 50%"></div></div>
          </div>
        
          <div style="font-size: 0.9em; margin-bottom: 4px;">CleanCup: 100
            <div class="score-bar"><div class="score-fill" style="width: 100%"></div></div>
          </div>
        
          </div>
        </div>

        <canvas id="roastChart" width="1000" height="500"></canvas>
      </div>

      <script>
        const roastData = [{"time":10,"bt":29.4,"envTemp":177.5,"ror":0.74,"heatPower":100},{"time":20,"bt":39.3,"envTemp":268.8,"ror":1.15,"heatPower":100},{"time":30,"bt":52.2,"envTemp":323.4,"ror":1.36,"heatPower":100},{"time":40,"bt":66.4,"envTemp":356.2,"ror":1.46,"heatPower":100},{"time":50,"bt":81.1,"envTemp":375.8,"ror":1.48,"heatPower":100},{"time":60,"bt":95.9,"envTemp":387.5,"ror":1.47,"heatPower":100},{"time":70,"bt":107.3,"envTemp":394.5,"ror":1.01,"heatPower":100},{"time":80,"bt":117.3,"envTemp":398.7,"ror":0.99,"heatPower":100},{"time":90,"bt":127.1,"envTemp":401.2,"ror":0.96,"heatPower":100},{"time":100,"bt":136.5,"envTemp":402.8,"ror":0.94,"heatPower":100},{"time":110,"bt":145.7,"envTemp":403.7,"ror":0.91,"heatPower":100},{"time":120,"bt":156.5,"envTemp":404.2,"ror":1.24,"heatPower":100},{"time":130,"bt":168.6,"envTemp":404.5,"ror":1.19,"heatPower":100},{"time":140,"bt":180.2,"envTemp":404.7,"ror":1.13,"heatPower":100},{"time":150,"bt":191.1,"envTemp":404.8,"ror":1.07,"heatPower":100},{"time":160,"bt":201.8,"envTemp":404.9,"ror":1.23,"heatPower":100},{"time":170,"bt":213.1,"envTemp":404.9,"ror":0.96,"heatPower":100},{"time":180,"bt":222.5,"envTemp":405,"ror":0.92,"heatPower":100},{"time":190,"bt":231.4,"envTemp":405,"ror":0.87,"heatPower":100},{"time":200,"bt":239.9,"envTemp":405,"ror":0.83,"heatPower":100},{"time":210,"bt":247.9,"envTemp":405,"ror":0.79,"heatPower":100},{"time":220,"bt":255.6,"envTemp":405,"ror":0.75,"heatPower":100},{"time":230,"bt":262.9,"envTemp":405,"ror":0.71,"heatPower":100},{"time":240,"bt":269.9,"envTemp":405,"ror":0.68,"heatPower":100},{"time":250,"bt":276.5,"envTemp":405,"ror":0.65,"heatPower":100},{"time":260,"bt":282.8,"envTemp":405,"ror":0.61,"heatPower":100},{"time":270,"bt":288.7,"envTemp":405,"ror":0.58,"heatPower":100},{"time":280,"bt":294.4,"envTemp":405,"ror":0.56,"heatPower":100},{"time":290,"bt":299.8,"envTemp":405,"ror":0.53,"heatPower":100},{"time":300,"bt":305,"envTemp":405,"ror":0.5,"heatPower":100},{"time":310,"bt":309.9,"envTemp":405,"ror":0.48,"heatPower":100},{"time":320,"bt":314.5,"envTemp":405,"ror":0.45,"heatPower":100},{"time":330,"bt":318.9,"envTemp":405,"ror":0.43,"heatPower":100},{"time":340,"bt":323.1,"envTemp":405,"ror":0.41,"heatPower":100},{"time":350,"bt":327.1,"envTemp":405,"ror":0.39,"heatPower":100},{"time":360,"bt":330.9,"envTemp":405,"ror":0.37,"heatPower":100},{"time":370,"bt":334.6,"envTemp":405,"ror":0.35,"heatPower":100},{"time":380,"bt":338,"envTemp":405,"ror":0.34,"heatPower":100},{"time":390,"bt":341.3,"envTemp":405,"ror":0.32,"heatPower":100},{"time":400,"bt":344.4,"envTemp":405,"ror":0.3,"heatPower":100},{"time":410,"bt":347.4,"envTemp":405,"ror":0.29,"heatPower":100},{"time":420,"bt":350.2,"envTemp":405,"ror":0.28,"heatPower":100}];
        const events = {"dryEnd":115,"firstCrack":159,"secondCrack":183};
    
    const labels = roastData.map(d => {
      const m = Math.floor(d.time / 60);
        const s = String(d.time % 60).padStart(2, '0');
        return m + ':' + s;
    });
    const btData = roastData.map(d => d.bt);
    const etData = roastData.map(d => d.envTemp);
    const rorData = roastData.map(d => d.ror);
    const powerData = roastData.map(d => d.heatPower);

        const eventLines = {
          id: 'eventLines',
      beforeDraw: chart => {
        const {ctx, chartArea, scales} = chart;
        const drawLine = (timeSec, color, label) => {
          if (!timeSec) return;
          const index = roastData.findIndex(d => d.time >= timeSec);
        if (index === -1) return;
        const x = scales.x.getPixelForTick(index);
        ctx.save();
        ctx.beginPath();
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = color;
        ctx.moveTo(x, chartArea.top);
        ctx.lineTo(x, chartArea.bottom);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.textAlign = 'right';
        ctx.font = "12px sans-serif";
        ctx.fillText(label, x - 5, chartArea.top + 15);
        ctx.restore();
        };

        drawLine(events.dryEnd, '#ffeb3b', 'Dry End');
        drawLine(events.firstCrack, '#ff9800', '1st Crack');
        drawLine(events.secondCrack, '#f44336', '2nd Crack');
      }
    };

        const ctx = document.getElementById('roastChart').getContext('2d');
        new Chart(ctx, {
          type: 'line',
        data: {
          labels: labels,
        datasets: [
        {
          label: 'Bean Temp (BT)', data: btData,
        borderColor: '#ff5252', backgroundColor: 'transparent',
        yAxisID: 'y', tension: 0.1, pointRadius: 0
          },
        {
          label: 'Env Temp (ET)', data: etData,
        borderColor: '#2196f3', backgroundColor: 'transparent',
        yAxisID: 'y', borderDash: [5, 5], tension: 0.1, pointRadius: 0
          },
        {
          label: 'RoR (C/sec)', data: rorData,
        borderColor: '#4caf50', backgroundColor: 'rgba(76, 175, 80, 0.2)',
        yAxisID: 'y1', tension: 0.3, fill: true, pointRadius: 0
          },
        {
          label: 'Heat Power (%)', data: powerData,
        borderColor: '#9e9e9e', backgroundColor: 'transparent',
        yAxisID: 'y2', borderWidth: 1, stepped: true, pointRadius: 0
          }
        ]
      },
        options: {
          responsive: true,
        interaction: {mode: 'index', intersect: false },
        plugins: {legend: {labels: {color: '#eee' } } },
        scales: {
          x: {ticks: {color: '#aaa', maxTicksLimit: 20 }, grid: {color: '#444' } },
        y: {
          type: 'linear', position: 'left',
        title: {display: true, text: 'Temperature (°C)', color: '#eee' },
        ticks: {color: '#aaa' }, grid: {color: '#444' }, min: 0, max: 400
          },
        y1: {
          type: 'linear', position: 'right',
        title: {display: true, text: 'RoR (°C/s)', color: '#4caf50' },
        ticks: {color: '#4caf50' }, grid: {drawOnChartArea: false }, min: -0.5, max: 2.0
          },
        y2: {
          type: 'linear', position: 'right', display: false, min: 0, max: 100 
          }
        }
      },
        plugins: [eventLines]
    });
      </script>
    </body>
  </html>
